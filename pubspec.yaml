name: smart_diet_ai
description: "SmartDiet AI - A multimodal personalized nutrition ecosystem powered by AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Supabase (Authentication, Database, Storage)
  supabase_flutter: ^2.8.4
  
  # HTTP Client
  http: ^1.2.2

  # On-device ONNX inference for MobileSAM-style segmentation
  onnxruntime: ^1.4.1

  # Image decoding and tensor preprocessing
  image: ^4.5.4
  
  # Image Picker (for camera/gallery access)
  image_picker: ^1.1.2
  
  # EXIF metadata extraction from photos
  exif: ^3.3.0
  
  # ARCore (plane hit-test measurement, Kang et al. 2024 approach)
  arcore_flutter_plugin: ^0.1.0

  # 3D vector math for AR geometry calculations
  vector_math: ^2.1.4
  
  # Local file storage
  path_provider: ^2.1.5
  
  # State Management (optional, for future use)
  # provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.4

  # Charts for benchmark comparison
  fl_chart: ^0.70.2

  # Share files (CSV export)
  share_plus: ^10.1.4

  # Markdown rendering for AI chat responses
  flutter_markdown: ^0.7.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/models/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
